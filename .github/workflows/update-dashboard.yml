name: Update Dashboard

on:
  schedule:
    # 10h UTC = 7h Brasília (sem horário de verão)
    - cron: '0 10 * * *'
  workflow_dispatch:  # permite rodar manualmente pelo GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Instagram — renovar token automaticamente
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          IG_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          NEW_TOKEN=$(curl -sf \
            "https://graph.facebook.com/v21.0/oauth/access_token?grant_type=fb_exchange_token&client_id=${{ secrets.IG_APP_ID }}&client_secret=${{ secrets.IG_APP_SECRET }}&fb_exchange_token=${IG_TOKEN}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))" 2>/dev/null || echo "")
          if [ -n "$NEW_TOKEN" ]; then
            echo "$NEW_TOKEN" | gh secret set IG_ACCESS_TOKEN --repo ${{ github.repository }}
            echo "Token Instagram renovado."
          else
            echo "Renovação não necessária ou falhou (token ainda válido)."
          fi

      - name: Clube de Vantagens — coletar dados
        timeout-minutes: 20
        continue-on-error: true
        env:
          PACTO_EMAIL: ${{ secrets.PACTO_EMAIL }}
          PACTO_SENHA: ${{ secrets.PACTO_SENHA }}
        run: |
          cd greenlife_scraper
          python scraper.py

      - name: Leads CRM Pacto — coletar dados
        timeout-minutes: 45
        continue-on-error: true
        env:
          PACTO_TOKENS: ${{ secrets.PACTO_TOKENS }}
        run: |
          cd greenlife_scraper
          python coletar_leads.py

      - name: Instagram — coletar métricas semanais
        timeout-minutes: 10
        continue-on-error: true
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          cd instagram-metrics
          python coletar_semanal.py

      - name: Gerar dashboard
        timeout-minutes: 5
        run: |
          cd greenlife_scraper
          python gerar_dashboard.py
          cp dashboard.html ../docs/dashboard.html

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in \
            greenlife_scraper/dados_greenlife.xlsx \
            greenlife_scraper/resumo_macro.xlsx \
            greenlife_scraper/leads_dados.json \
            greenlife_scraper/historico_leads.xlsx \
            instagram-metrics/base_seguidores.xlsx \
            instagram-metrics/base_interacoes_total.xlsx \
            instagram-metrics/base_interacoes_detalhadas.xlsx \
            docs/dashboard.html; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --cached --quiet && echo "Nenhuma alteracao" || \
            git commit -m "Dashboard: $(date +'%Y-%m-%d %H:%M UTC')" && git push
