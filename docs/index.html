<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greenlife BI — Acesso</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 40%, rgba(16,185,129,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 70%, rgba(5,150,105,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 16px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-mark {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      color: #fff;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .logo-text { line-height: 1.2; }
    .logo-title { font-size: 15px; font-weight: 700; color: #e6edf3; }
    .logo-sub { font-size: 12px; color: #7d8590; }

    h1 { font-size: 20px; font-weight: 700; color: #e6edf3; margin-bottom: 6px; }
    p.desc { font-size: 13px; color: #7d8590; margin-bottom: 28px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #7d8590;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .input-wrap { position: relative; margin-bottom: 20px; }

    input[type="password"], input[type="text"] {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 44px 12px 14px;
      font-size: 15px;
      color: #e6edf3;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #10b981; }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #7d8590;
      background: none;
      border: none;
      padding: 4px;
      display: flex;
      align-items: center;
    }
    .toggle-pw:hover { color: #e6edf3; }

    .error { font-size: 12px; color: #f85149; margin-top: -12px; margin-bottom: 16px; display: none; }

    button.btn-login {
      width: 100%;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button.btn-login:hover { opacity: 0.92; }
    button.btn-login:active { transform: scale(0.98); }

    .footer { margin-top: 24px; text-align: center; font-size: 11px; color: #484f58; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">GL</div>
      <div class="logo-text">
        <div class="logo-title">Greenlife Academias</div>
        <div class="logo-sub">BI &amp; Marketing</div>
      </div>
    </div>

    <h1>Bem-vindo</h1>
    <p class="desc">Digite a senha para acessar o dashboard.</p>

    <label for="pw">Senha</label>
    <div class="input-wrap">
      <input type="password" id="pw" placeholder="••••••••••••" autofocus
             onkeydown="if(event.key==='Enter')entrar()">
      <button class="toggle-pw" onclick="togglePw()" tabindex="-1" title="Mostrar/ocultar">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    <div class="error" id="err">Senha incorreta. Tente novamente.</div>

    <button class="btn-login" onclick="entrar()">Entrar</button>

    <div class="footer">Greenlife Academias &copy; 2026</div>
  </div>

  <script>
    const HASH = "087dfe823a4378f422ea8f4a99f2b0e73aa1084f1cbe5a2e9b71399868d4b368";

    async function sha256(str) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
    }

    async function entrar() {
      const hash = await sha256(document.getElementById("pw").value);
      if (hash === HASH) {
        sessionStorage.setItem("gl_auth", "1");
        window.location.href = "dashboard.html";
      } else {
        document.getElementById("err").style.display = "block";
        document.getElementById("pw").focus();
      }
    }

    function togglePw() {
      const inp = document.getElementById("pw");
      inp.type = inp.type === "password" ? "text" : "password";
    }
  </script>
</body>
</html>
