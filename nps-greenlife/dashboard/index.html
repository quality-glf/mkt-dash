  document.getElementById('gl-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function filterPrioPainel(tema) {
  _prioPainelTema = tema;
  // Atualiza botões
  document.querySelectorAll('.gl-painel-filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tema === tema);
  });
  // Atualiza comentários
  const uRecs = allRecords.filter(r => r.unidade_padronizada === _prioPainelUnit);
  document.getElementById('prio-painel-comments').innerHTML =
    renderPrioPainelComments(uRecs, tema);
}

function renderPrioPainelComments(uRecs, tema) {
  // Filtra por tema e ordena: mais crítico + mais recente primeiro
  let filtered = uRecs.filter(r => r.comentario_original || r.resumo_ia);
  if (tema !== 'todos') {
    filtered = filtered.filter(r => r.tema_principal_ia === tema);
  }
  const ord = {'Crítica':0,'Alta':1,'Média':2,'Baixa':3};
  filtered.sort((a, b) => {
    const cDiff = (ord[a.criticidade_ia]||3) - (ord[b.criticidade_ia]||3);
    if (cDiff !== 0) return cDiff;
    return (b._date||0) - (a._date||0);
  });

  if (!filtered.length) {
    return `<div style="text-align:center;padding:2rem;color:var(--gray-400);font-size:.85rem">Nenhum comentário para este filtro.</div>`;
  }

  return filtered.map(r => {
    const critCls = (r.criticidade_ia||'baixa').toLowerCase()
      .replace(/[íi]/g,'i').replace(/[eé]/g,'e').replace(/ê/g,'e');
    const ncClass  = r.tipo_nps === 'Promotor' ? 'nc-promotor' : r.tipo_nps === 'Detrator' ? 'nc-detrator' : 'nc-neutro';
    const cancelBadge = isCritico(r)
      ? `<span style="background:#FEE2E2;color:#991B1B;font-size:.63rem;font-weight:700;padding:.12rem .4rem;border-radius:3px">Possibilidade de cancelamento</span>` : '';

    return `<div class="gl-painel-comment-card">
      <div class="gl-painel-comment-header">
        <span class="nota-circle ${ncClass}" style="width:24px;height:24px;font-size:.7rem;flex-shrink:0">${r._nota}</span>
        <span class="tag-crit crit-${critCls}" style="font-size:.63rem">${esc(r.criticidade_ia||'—')}</span>
        ${r.tema_principal_ia ? `<span class="tag-theme" style="font-size:.63rem">${esc(r.tema_principal_ia)}</span>` : ''}
        ${cancelBadge}
        <span style="font-size:.68rem;color:var(--gray-400);margin-left:auto">${r._date ? r._date.toLocaleDateString('pt-BR') : ''}</span>
      </div>
      ${r.resumo_ia && r.resumo_ia !== 'Sem comentário'
        ? `<div class="gl-painel-resumo">💡 ${esc(r.resumo_ia)}</div>` : ''}
      ${r.comentario_original
        ? `<div class="gl-painel-comentario">"${esc(r.comentario_original)}"</div>` : ''}
      ${r.acao_sugerida_ia
        ? `<div class="gl-painel-acao-item">→ ${esc(r.acao_sugerida_ia)}</div>` : ''}
    </div>`;
  }).join('');
}

// =============================================================================
// RENDER — MÉTRICAS GERAIS (NPS hero + strip)
// =============================================================================
function renderMetricasGerais(recs, nps, npsDelta, mesPrev, promotores, neutros, detratores, criticos, byUnit) {
  let deltaStr = '';
  if (npsDelta !== null && mesPrev) {
    const sign  = npsDelta > 0 ? '+' : '';
    const icon  = npsDelta > 0 ? '▲' : npsDelta < 0 ? '▼' : '—';
    const color = npsDelta > 0 ? 'rgba(255,255,255,.85)' : npsDelta < 0 ? '#FCA5A5' : 'rgba(255,255,255,.6)';
    deltaStr = `<span class="gl-hero-delta" style="color:${color}">${icon} ${sign}${npsDelta}pp vs ${fmtMesAno(mesPrev)}</span>`;
  }
  const metaStr = nps !== null
    ? (nps >= META_NPS ? `✓ ${nps - META_NPS}pp acima da meta` : `↓ ${Math.abs(nps - META_NPS)}pp abaixo da meta (${META_NPS}%)`)
    : `Meta: ${META_NPS}%`;

  return `<div class="gl-section">
    <div style="display:grid;grid-template-columns:220px 1fr;gap:1rem;align-items:start;margin-bottom:.75rem">
      <div class="gl-hero-card">
        <div class="gl-hero-label">NPS da Rede</div>
        <div class="gl-hero-value">${nps !== null ? nps + '%' : '—'}</div>
        <div class="gl-hero-meta">${metaStr}</div>
        ${deltaStr}
      </div>
      <div class="gl-metrics-strip" style="margin-bottom:0">
        <div class="gl-metric">
          <div class="gl-metric-label">Respostas</div>
          <div class="gl-metric-value">${recs.length}</div>
          <div class="gl-metric-sub">${Object.keys(byUnit).length} unidades</div>
        </div>
        <div class="gl-metric success">
          <div class="gl-metric-label">Promotores</div>
          <div class="gl-metric-value">${promotores}</div>
          <div class="gl-metric-sub">${recs.length > 0 ? (promotores/recs.length*100).toFixed(0) + '%' : '—'}</div>
        </div>
        <div class="gl-metric">
          <div class="gl-metric-label">Neutros</div>
          <div class="gl-metric-value">${neutros}</div>
          <div class="gl-metric-sub">${recs.length > 0 ? (neutros/recs.length*100).toFixed(0) + '%' : '—'}</div>
        </div>
        <div class="gl-metric ${detratores > 0 ? 'danger' : ''}">
          <div class="gl-metric-label">Detratores</div>
          <div class="gl-metric-value">${detratores}</div>
          <div class="gl-metric-sub">${recs.length > 0 ? (detratores/recs.length*100).toFixed(0) + '%' : '—'}</div>
        </div>
        <div class="gl-metric ${criticos > 0 ? 'danger' : ''}" ${criticos > 0 ? "onclick=\"switchView('criticos')\" style=\"cursor:pointer\"" : ''}>
          <div class="gl-metric-label">Cancelamentos</div>
          <div class="gl-metric-value">${criticos}</div>
          <div class="gl-metric-sub">risco detectado</div>
        </div>
      </div>
    </div>
  </div>`;
}

// =============================================================================
// RENDER — PROBLEMAS MAIS RECORRENTES DA REDE
// =============================================================================
function renderProblemasRecorrentes(problemas) {
  const visiveis = problemas.filter(p =>
    p.qtd >= 2 || p.criticos > 0 || p.consecDias >= 2
  ).slice(0, 12);

  if (!visiveis.length) return '';

  const rows = visiveis.map((p, idx) => {
    const rec = recorrenciaInfo(p.consecDias);
    const unidadesStr = p.unidades.slice(0, 3).join(', ') + (p.unidades.length > 3 ? ` +${p.unidades.length - 3}` : '');
    const nivel = p.criticos > 0 ? 'critico' : p.altas > 0 ? 'alta' : p.comRisco > 0 ? 'alta' : 'media';
    const nivelLabel = { critico:'Crítico', alta:'Alto', media:'Médio' }[nivel] || 'Médio';
    const nivelCls   = { critico:'crit-critica', alta:'crit-alta', media:'crit-media' }[nivel] || 'crit-media';
    const accordionId = `gl-prob-acc-${idx}`;

    // Linha do tempo de dias (últimos 7 dias)
    const hoje = new Date();
    let timelineHTML = '';
    for (let d = 6; d >= 0; d--) {
      const dia = new Date(hoje); dia.setDate(hoje.getDate() - d);
      const dStr = dia.toISOString().split('T')[0];
      const temOcorr = p.allDates.includes(dStr);
      const label = dia.getDate() + '/' + pad(dia.getMonth() + 1);
      timelineHTML += `<div class="gl-tl-day ${temOcorr ? 'gl-tl-active' : ''}" title="${label}${temOcorr ? ' — ocorrência' : ''}"></div>`;
    }

    // Accordion: unidades com detratores, por contagem desc
    const detByUnit = {};
    p.tRecs.filter(r => r.tipo_nps === 'Detrator')
      .forEach(r => {
        const u = r.unidade_padronizada || '—';
        if (!detByUnit[u]) detByUnit[u] = [];
        detByUnit[u].push(r);
      });
    const unitsSorted = Object.entries(detByUnit)
      .sort((a, b) => b[1].length - a[1].length);

    const accordionHTML = unitsSorted.length ? unitsSorted.map(([u, uRecs]) => {
      const comments = uRecs
        .sort((a, b) => (b._date||0) - (a._date||0))
        .slice(0, 2)
        .map(r => {
          const texto = (r.resumo_ia && r.resumo_ia !== 'Sem comentário') ? r.resumo_ia : r.comentario_original;
          if (!texto) return '';
          return `<div class="gl-prob-det-date">${r._date ? r._date.toLocaleDateString('pt-BR') : ''}</div>
          <div class="gl-prob-det-comment">${esc(texto)}</div>`;
        }).filter(Boolean).join('');
      return `<div>
        <div class="gl-prob-unit-header">
          <span class="gl-prob-unit-name">${esc(u)}</span>
          <span class="gl-prob-unit-count">${uRecs.length} detrator${uRecs.length>1?'es':''}</span>
        </div>
        ${comments || `<div style="font-size:.7rem;color:var(--gray-400)">Sem comentário registrado.</div>`}
      </div>`;
    }).join('') : `<div style="font-size:.72rem;color:var(--gray-400)">Nenhum detrator neste tema.</div>`;

    const detTotal = Object.values(detByUnit).reduce((s, v) => s + v.length, 0);

    return `<div class="gl-prob-card">
      <div class="gl-prob-card-top">
        <div class="gl-prob-card-tema">${esc(p.tema)}</div>
        <div style="display:flex;gap:.4rem;align-items:center;flex-shrink:0">
          <span class="tag-crit ${nivelCls}" style="font-size:.65rem">${nivelLabel}</span>
          <span class="gl-rec-badge ${rec.cls}">${rec.badge}</span>
        </div>
      </div>
      <div class="gl-prob-card-meta">
        <span class="gl-prob-stat"><strong>${p.qtd}</strong> ocorrência${p.qtd>1?'s':''}</span>
        <span class="gl-prob-stat"><strong>${p.unidades.length}</strong> unidade${p.unidades.length>1?'s':''}</span>
        ${p.criticos > 0 ? `<span class="gl-prob-stat" style="color:var(--red)"><strong>${p.criticos}</strong> crítico${p.criticos>1?'s':''}</span>` : ''}
        ${p.comRisco > 0 ? `<span class="gl-prob-stat" style="color:var(--red)"><strong>${p.comRisco}</strong> cancelamento${p.comRisco>1?'s':''}</span>` : ''}
      </div>
      <div class="gl-prob-card-units">${esc(unidadesStr)}</div>
      <div class="gl-prob-card-bottom">
        <div class="gl-timeline-wrap">
          <span class="gl-tl-label">Últimos 7 dias</span>
          <div class="gl-timeline">${timelineHTML}</div>
          <span class="gl-tl-rec">${rec.label}</span>
        </div>
        ${detTotal > 0 ? `<button class="gl-prob-toggle" id="btn-${accordionId}" onclick="toggleProblema('${accordionId}')">▼ ${detTotal} detrator${detTotal>1?'es':''}</button>` : ''}
      </div>
      ${p.topAcao ? `<div class="gl-prob-acao">→ ${esc(p.topAcao)}</div>` : ''}
      <div class="gl-prob-accordion" id="${accordionId}">${accordionHTML}</div>
    </div>`;
  }).join('');

  const rec3 = visiveis.filter(p => p.consecDias >= 3).length;
  const rec2 = visiveis.filter(p => p.consecDias === 2).length;
  const sub = [
    rec3 > 0 ? `${rec3} recorrente${rec3>1?'s':''}` : '',
    rec2 > 0 ? `${rec2} em atenção` : '',
  ].filter(Boolean).join(' · ');

  return `<div class="gl-section">
    <div class="gl-section-header">
      <div class="gl-section-title">Problemas mais recorrentes da rede</div>
      <div class="gl-section-sub">${sub || visiveis.length + ' temas identificados'}</div>
    </div>
    <div class="gl-prob-grid">${rows}</div>
    <div class="gl-rec-legenda">
      <span class="gl-rec-badge rec-1">Pontual</span> 1 dia &nbsp;·&nbsp;
      <span class="gl-rec-badge rec-2">Atenção</span> 2 dias seguidos &nbsp;·&nbsp;
      <span class="gl-rec-badge rec-3">Recorrente</span> 3+ dias consecutivos
    </div>
  </div>`;
}

// =============================================================================
// RENDER — RANKING DE UNIDADES (tabela compacta)
// =============================================================================
function renderRankingUnidadesGL(recs) {
  const byUnit = groupBy(recs, r => r.unidade_padronizada);
  const rows = Object.entries(byUnit)
    .map(([u, v]) => {
      const score    = calcPrioScore(v);
      const level    = getPrioLevel(score);
      const nps      = calcNPS(v);
      const criticos = v.filter(r => isCritico(r)).length;
      const regiao   = v[0]?.regiao || '';
      const tema     = topTema(v);
      return { u, v, score, level, nps, criticos, regiao, tema, n: v.length };
    })
    .sort((a, b) => (a.nps ?? -999) - (b.nps ?? -999));

  const levelCfg = {
    critico: { dot:'#DC2626', label:'Crítico' },
    alta:    { dot:'#F59E0B', label:'Alto'    },
    media:   { dot:'var(--gl-olive)', label:'Médio' },
    ok:      { dot:'#15803D', label:'—'       },
  };

  const tbody = rows.map((item, i) => {
    const cfg = levelCfg[item.level] || levelCfg.ok;
    const npsColor = item.nps !== null && item.nps >= META_NPS ? '#15803D' : item.nps !== null && item.nps >= 0 ? '#D97706' : '#DC2626';
    const npsBg    = item.nps !== null && item.nps >= META_NPS ? '#D1FAE5' : item.nps !== null && item.nps >= 0 ? '#FEF3C7' : '#FEE2E2';
    return `<tr class="gl-rank-tr" onclick="openUnitPanel('${esc(item.u)}')" title="Ver detalhes">
      <td><span style="font-size:.72rem;color:var(--gray-400);font-weight:600">${i+1}</span></td>
      <td>
        <div style="font-size:.83rem;font-weight:600;color:var(--gray-800)">${esc(item.u)}</div>
        <div style="font-size:.68rem;color:var(--gray-400)">${esc(item.regiao)}</div>
      </td>
      <td><span class="nps-pill" style="background:${npsBg};color:${npsColor};font-size:.75rem">${item.nps !== null ? item.nps + '%' : '—'}</span></td>
      <td style="text-align:center;font-size:.82rem">${item.n}</td>
      <td>
        <div style="display:flex;align-items:center;gap:.4rem">
          <span style="width:8px;height:8px;border-radius:50%;background:${cfg.dot};flex-shrink:0;display:inline-block"></span>
          <span style="font-size:.72rem;color:var(--gray-600)">${item.level !== 'ok' ? cfg.label : '—'}</span>
        </div>
      </td>
      <td><span class="tag-theme" style="font-size:.68rem">${esc(item.tema || '—')}</span></td>
      <td style="text-align:center">${item.criticos > 0 ? `<span style="color:var(--red);font-weight:700;font-size:.8rem">⚠ ${item.criticos}</span>` : '<span style="color:var(--gray-300)">—</span>'}</td>
      <td><span style="font-size:.75rem;color:var(--gl-olive);font-weight:600;cursor:pointer">Ver →</span></td>
    </tr>`;
  }).join('');

  return `<div class="gl-section">
    <div class="gl-section-header">
      <div class="gl-section-title">Ranking de unidades</div>
      <div class="gl-section-sub">Ordenadas por prioridade de atenção — clique para ver detalhes</div>
    </div>
    <div class="card" style="padding:0;overflow:hidden;margin-bottom:0">
      <div class="table-scroll">
        <table class="rank-table" style="min-width:620px">
          <thead><tr>
            <th>#</th><th>Unidade</th><th>NPS</th>
            <th style="text-align:center">Resp.</th><th>Atenção</th>
            <th>Top tema</th><th style="text-align:center">Cancelamentos</th><th></th>
          </tr></thead>
          <tbody>${tbody}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}

function renderTopPioresRecentes(recs) {
  const today = new Date();
  const cutoff = new Date(today.getTime() - 10 * 24 * 60 * 60 * 1000);
  const recent = recs.filter(r => r._date && r._date >= cutoff);
  const pool = recent.length >= 10 ? recent : recs;
  const label = recent.length >= 10 ? 'Últimos 10 Dias' : 'Período Completo';

  const byUnit = groupBy(pool, r => r.unidade_padronizada);
  const sorted = Object.entries(byUnit)
    .filter(([,v]) => v.length >= 2)
    .map(([u, v]) => ({ u, nps: calcNPS(v), n: v.length, tema: topTema(v) }))
    .sort((a, b) => a.nps - b.nps)
    .slice(0, 5);

  const rows = sorted.map((item, i) => `<tr>
    <td><span class="rank-num">${i + 1}</span></td>
    <td><strong>${esc(item.u)}</strong><br><span style="font-size:.72rem;color:var(--gray-400)">${esc(item.tema)}</span></td>
    <td><span class="nps-pill ${npsClass(item.nps)}">${item.nps !== null ? item.nps + '%' : '—'}</span></td>
    <td style="text-align:center;color:var(--gray-500)">${item.n}</td>
  </tr>`).join('');

    ${sorted.length === 0 ? '<div class="empty">Dados insuficientes</div>' : `
    <table class="rank-table">
      <thead><tr><th>#</th><th>Unidade</th><th>NPS</th><th style="text-align:center">Resp.</th></tr></thead>

}

// =============================================================================
// PROBLEMAS URGENTES — card completo (filtros + conteúdo)
// =============================================================================
function renderProblemasCard(recs) {
  const urgentes = getUrgentes(recs);
  const temas = [...new Set(urgentes.map(r => r.tema_principal_ia).filter(Boolean))].sort();

  const filterBtns = `<div class="chart-filter-btns" style="margin-bottom:.75rem">
    <button class="cfbtn prob-filter-btn ${problemasFilter === 'todos' ? 'active-tema' : ''}" data-tema="todos" onclick="setProbFilter('todos')">Todos</button>
    ${temas.map(t => `<button class="cfbtn prob-filter-btn ${problemasFilter === t ? 'active-tema' : ''}" data-tema="${esc(t)}" onclick="setProbFilter('${esc(t)}')">${esc(t)}</button>`).join('')}
  </div>`;

  const explain = `<div class="prob-explain">
    Inclui respostas com <strong>criticidade Alta ou Crítica</strong> e/ou que <strong>requerem ação imediata</strong> segundo a IA.
    Ordenadas por gravidade e agrupadas por unidade. Total: <strong>${urgentes.length}</strong> ocorrências.
  </div>`;

  return filterBtns + explain + `<div id="prob-content">${renderProblemasConteudo(recs)}</div>`;
}

function getUrgentes(recs) {
  return recs.filter(r =>
    r.resumo_ia && r.resumo_ia !== 'Sem comentário' &&
    (r.requer_acao || isCritico(r) || r.criticidade_ia === 'Alta' || r.criticidade_ia === 'Crítica')
  );
}

function renderProblemasConteudo(recs) {
  const pOrd = { 'Crítica': 0, 'Alta': 1, 'Média': 2, 'Baixa': 3 };
  let urgentes = getUrgentes(recs);

  // Apply tema filter
  if (problemasFilter && problemasFilter !== 'todos') {
    urgentes = urgentes.filter(r => r.tema_principal_ia === problemasFilter);
  }

  // Sort: criticidade → unidade → data desc
  urgentes.sort((a, b) => {
    const cDiff = (pOrd[a.criticidade_ia] ?? 3) - (pOrd[b.criticidade_ia] ?? 3);
    if (cDiff !== 0) return cDiff;
    const uDiff = (a.unidade_padronizada || '').localeCompare(b.unidade_padronizada || '', 'pt-BR');
    if (uDiff !== 0) return uDiff;
    return (b._date || 0) - (a._date || 0);
  });

  const visible = urgentes.slice(0, 25);
  if (!visible.length) return '<div class="empty">Nenhum problema encontrado para este filtro</div>';

  const rows = visible.map(r => {
    const critClass = (r.criticidade_ia || 'baixa').toLowerCase().replace(/[íi]/g,'i').replace(/[eé]/g,'e').replace(/ê/g,'e');
    const critTag = `<span class="tag-crit crit-${critClass}">${esc(r.criticidade_ia || '—')}</span>`;
    const criticoTag = isCritico(r) ? `<span class="kpi-badge badge-red">Crítico</span>` : '';
    const recTag = r.problema_recorrente ? `<span class="kpi-badge badge-amber">Recorrente</span>` : '';
    const ncClass = r.tipo_nps === 'Promotor' ? 'nc-promotor' : r.tipo_nps === 'Detrator' ? 'nc-detrator' : 'nc-neutro';
    const temaTag = r.tema_principal_ia ? `<span class="tag-theme">${esc(r.tema_principal_ia)}</span>` : '';
    return `<tr>
      <td><span class="nota-circle ${ncClass}" style="display:inline-flex;width:24px;height:24px;font-size:.72rem">${r._nota}</span></td>
      <td style="font-size:.8rem;line-height:1.4">${esc(r.resumo_ia)}</td>
      <td><strong style="font-size:.78rem">${esc(r.unidade_padronizada)}</strong></td>
      <td style="white-space:nowrap;font-size:.73rem;color:var(--gray-400)">${r._date ? r._date.toLocaleDateString('pt-BR') : ''}</td>
      <td>${temaTag}</td>
      <td>${critTag} ${criticoTag} ${recTag}</td>
    </tr>`;
  }).join('');

  return `<div class="table-scroll"><table class="rank-table">
    <thead><tr><th>Nota</th><th>Problema</th><th>Unidade</th><th>Data</th><th>Tema</th><th>Status</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

// =============================================================================
// KEYWORDS PANEL (ao lado da distribuição de temas)
// =============================================================================
function renderKeywordsPanel(recs) {
  const withTema = recs.filter(r => r.tema_principal_ia && !TEMAS_EXCLUIDOS.includes(r.tema_principal_ia));
  const byTema = groupBy(withTema, r => r.tema_principal_ia);
  const sorted = Object.entries(byTema).sort((a, b) => b[1].length - a[1].length).slice(0, 14);

  const items = sorted.map(([tema, v]) => {
    const kwSet = new Set();
    v.forEach(r => {
      const kws = r.palavras_chave_ia || r.keywords_ia || r.keywords || '';
      String(kws).split(/[,;|]+/).map(k => k.trim()).filter(k => k.length > 2).forEach(k => kwSet.add(k));
    });
    const kws = [...kwSet].slice(0, 7);
    return { tema, kws };
  });

  const hasKeywords = items.some(i => i.kws.length > 0);
  if (!hasKeywords) return `<div style="font-size:.75rem;color:var(--gray-400);padding:.5rem;text-align:center">Palavras-chave indisponíveis nos dados</div>`;

  return `<div style="font-size:.72rem;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.5rem">Palavras-chave por tema</div>
  <div class="keywords-panel">${items.map(item => `
    <div class="kw-item">
      <div class="kw-tema">${esc(item.tema)}</div>
      <div class="kw-tags">
        ${item.kws.length ? item.kws.map(k => `<span class="kw-tag">${esc(k)}</span>`).join('') : '<span style="font-size:.68rem;color:var(--gray-400)">—</span>'}
      </div>
    </div>
  `).join('')}</div>`;
}

// =============================================================================
// RANKING COMPLETO — sem Nota Média, sem "Sem comentários" como top tema
// =============================================================================
function renderRankingTable(recs) {
  const byUnit = groupBy(recs, r => r.unidade_padronizada);
  const rows = Object.entries(byUnit)
    .map(([u, v]) => {
      const nps = calcNPS(v);
      const criticos = v.filter(r => isCritico(r)).length;
      const tema = topTema(v); // already excludes TEMAS_EXCLUIDOS
      const regiao = v[0]?.regiao || '';
      return { u, nps, criticos, n: v.length, tema, regiao };
    })
    .sort((a, b) => (b.nps ?? -999) - (a.nps ?? -999));

  const rows_html = rows.map((item, i) => {
    const metaStatus = item.nps !== null && item.nps >= META_NPS
      ? '<span class="badge-green kpi-badge">✓ Meta</span>'
      : '<span class="badge-red kpi-badge">↓ Abaixo</span>';
    return `<tr>
      <td><span class="rank-num">${i + 1}</span></td>
      <td><strong>${esc(item.u)}</strong></td>
      <td>${esc(item.regiao)}</td>
      <td style="text-align:center">${item.n}</td>
      <td style="text-align:center"><span class="nps-pill ${npsClass(item.nps)}">${item.nps !== null ? item.nps + '%' : '—'}</span></td>
      <td><span class="tag-theme">${esc(item.tema || '—')}</span></td>
      <td style="text-align:center">${item.criticos > 0 ? `<span style="color:var(--red);font-weight:600">${item.criticos}</span>` : '—'}</td>
      <td>${metaStatus}</td>
    </tr>`;
  }).join('');

  return `<table class="rank-table">
    <thead><tr>
      <th>#</th><th>Unidade</th><th>Região</th><th style="text-align:center">Resp.</th>
      <th style="text-align:center">NPS</th><th>Top Tema</th>
      <th style="text-align:center">Críticos</th><th>Meta</th>
    </tr></thead>
    <tbody>${rows_html}</tbody>
  </table>`;
}

// =============================================================================
// PLANO DE AÇÃO — com botão expandir resumos de IA
// =============================================================================
function renderActionPlanGeral(recs) {
  const urgentes = recs.filter(r => r.acao_sugerida_ia && (r.requer_acao || r.criticidade_ia === 'Alta' || r.criticidade_ia === 'Crítica'));
  const byAcao = groupBy(urgentes, r => r.acao_sugerida_ia || 'sem-acao');

  const allAcoes = Object.entries(byAcao)
    .map(([acao, v]) => {
      const alta = v.filter(r => r.criticidade_ia === 'Alta' || r.criticidade_ia === 'Crítica').length;
      const prio = alta > 2 ? 'Alta' : alta > 0 ? 'Média' : 'Baixa';
      const unidadesAfetadas = [...new Set(v.map(r => r.unidade_padronizada))].filter(Boolean);
      const temas = [...new Set(v.map(r => r.tema_principal_ia).filter(Boolean))];
      const critico = v.some(r => r.criticidade_ia === 'Crítica');
      const recorrente = v.some(r => r.problema_recorrente);
      const qtd = v.length;
      let tipoProbTag = '';
      if (critico) tipoProbTag = '<span class="prob-tag prob-critico">Muito Grave</span>';
      else if (recorrente) tipoProbTag = '<span class="prob-tag prob-recorrente">Muito Recorrente</span>';
      else if (qtd >= 3) tipoProbTag = '<span class="prob-tag prob-repetido">Repetido</span>';
      else tipoProbTag = '<span class="prob-tag prob-novo">Novo</span>';
      const resumos = v.filter(r => r.resumo_ia && r.resumo_ia !== 'Sem comentário');
      return { acao, prio, qtd, unidades: unidadesAfetadas, temas, tipoProbTag, resumos };
    })
    .sort((a, b) => {
      const order = { 'Alta': 0, 'Média': 1, 'Baixa': 2 };
      return (order[a.prio] || 2) - (order[b.prio] || 2);
    })
    .slice(0, 12);

  if (!allAcoes.length) return '<div class="empty">Nenhuma ação identificada nos dados filtrados.</div>';

  const rows = allAcoes.map((a, idx) => {
    const uStr = a.unidades.slice(0, 4).join(', ') + (a.unidades.length > 4 ? ` +${a.unidades.length - 4}` : '');
    const temasStr = a.temas.slice(0, 2).map(t => `<span class="tag-theme">${esc(t)}</span>`).join(' ');
    const sumId = `sum-${idx}`;

    const sumsHTML = a.resumos.slice(0, 8).map(r =>
      `<div class="sum-item">
        <span class="sum-item-unit">${esc(r.unidade_padronizada || '')}${r._date ? ' · ' + r._date.toLocaleDateString('pt-BR') : ''}</span>
        "${esc(r.resumo_ia)}"
      </div>`
    ).join('');

    return `<tr>
      <td>${temasStr}</td>
      <td style="font-size:.79rem;max-width:260px">${esc(a.acao)}</td>
      <td><span style="font-size:.72rem;color:var(--gray-500)">${esc(uStr)}</span></td>
      <td style="text-align:center"><strong>${a.qtd}</strong></td>
      <td>${a.tipoProbTag}</td>
      <td><span class="prio-tag prio-${a.prio.toLowerCase()}">${a.prio}</span></td>
      <td>${a.resumos.length > 0 ? `<button class="btn-ver-resumos" onclick="toggleResumos('${sumId}')">💬 ${a.resumos.length} resumo${a.resumos.length > 1 ? 's' : ''}</button>` : '—'}</td>
    </tr>
    <tr id="${sumId}-row" class="action-sum-row" style="display:none">
      <td colspan="7">
        <div class="action-sum-inner">
          <div style="font-size:.72rem;font-weight:600;color:var(--gray-500);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.04em">Resumos de IA — problemas que geraram esta ação</div>
          ${sumsHTML || '<div class="empty" style="padding:.5rem">Sem resumos disponíveis</div>'}
        </div>
      </td>
    </tr>`;
  }).join('');

  return `<table class="action-table">
    <thead><tr>
      <th>Tema</th><th>Ação Sugerida</th><th>Unidades</th>
      <th style="text-align:center">Ocorr.</th><th>Tipo</th><th>Prioridade</th><th>Resumos</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function toggleResumos(id) {
  const row = document.getElementById(id + '-row');
  if (!row) return;
  row.style.display = row.style.display === 'none' ? '' : 'none';
}

// =============================================================================
// CHARTS — VISÃO GERAL
// =============================================================================
function renderNPSDayChart(recs) {
  // NPS acumulado: do início do período até cada dia
  const byDay = groupBy(recs, r => r._date ? r._date.toISOString().split('T')[0] : null);
  const sortedDays = Object.keys(byDay).filter(Boolean).sort();
  if (!sortedDays.length) return;

  const labels = sortedDays.map(d => {
    const dt = new Date(d + 'T12:00:00');
    return dt.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' });
  });

  // Acumulado: todos os registros do início até o dia inclusive
  const npsData = sortedDays.map(day => {
    const cumRecs = recs.filter(r => r._date && r._date.toISOString().split('T')[0] <= day);
    return calcNPS(cumRecs);
  });

  newChart('nps-day', 'chart-nps-day', 'line', {
    labels,
    datasets: [
      {
        label: 'NPS acumulado (%)',
        data: npsData,
        borderColor: '#0284C7',
        backgroundColor: 'rgba(2,132,199,.1)',
        borderWidth: 2.5,
        pointBackgroundColor: npsData.map(v => v !== null && v >= META_NPS ? '#15803D' : '#DC2626'),
        pointRadius: 5,
        tension: 0.3,
        fill: true,
        order: 1,
      },
      {
        label: `Meta (${META_NPS}%)`,
        data: labels.map(() => META_NPS),
        borderColor: '#D97706',
        borderWidth: 1.5,
        borderDash: [6, 4],
        pointRadius: 0,
        tension: 0,
        fill: false,
        order: 0,
      },
    ],
  }, {
    plugins: {
      legend: { display: true, labels: { font:{size:10}, boxWidth:12, padding:12 } },
      tooltip: { callbacks: { label: ctx => ctx.dataset.label === `Meta (${META_NPS}%)` ? `Meta: ${META_NPS}%` : 'NPS acumulado: ' + ctx.parsed.y + '%' } },
    },
    scales: {
      y: { suggestedMin: -100, suggestedMax: 100, ticks: { font:{size:10}, callback: v => v+'%' }, grid: { color:'rgba(0,0,0,.05)' } },
      x: { ticks: { font:{size:10}, autoSkip:false, maxRotation:45 }, grid: { display:false } },
    },
  });
}

// =============================================================================
// UNIT CHARTS
// =============================================================================
function renderUnitDayChart(recs) {
  const byDay = groupBy(recs, r => r._date ? r._date.toISOString().split('T')[0] : null);
  const days = Object.keys(byDay).filter(Boolean).sort();
  const labels = days.map(d => new Date(d + 'T12:00:00').toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'}));

  newChart('unit-day', 'chart-unit-day', 'bar', {
    labels,
    datasets: [{
      label: 'Respostas',
      data: days.map(d => byDay[d].length),
      backgroundColor: '#686d57',
      borderRadius: 4,
    }],
  }, {
    plugins: { legend: { display: false } },
    scales: {
      y: { ticks:{font:{size:10}}, grid:{color:'rgba(0,0,0,.04)'} },
      x: { ticks:{font:{size:10},autoSkip:false,maxRotation:45}, grid:{display:false} },
    },
  });
}

function renderUnitNPSChart(recs) {
  const byDay = groupBy(recs, r => r._date ? r._date.toISOString().split('T')[0] : null);
  const days = Object.keys(byDay).filter(Boolean).sort();
  const labels = days.map(d => new Date(d + 'T12:00:00').toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'}));
  const npsData = days.map(d => calcNPS(byDay[d]));

  newChart('unit-nps', 'chart-unit-nps', 'line', {
    labels,
    datasets: [{
      label: 'NPS (%)',
      data: npsData,
      borderColor: '#1D4ED8',
      backgroundColor: 'rgba(29,78,216,.1)',
      borderWidth: 2.5,
      pointRadius: 5,
      pointBackgroundColor: npsData.map(v => v !== null && v >= META_NPS ? '#15803D' : '#DC2626'),
      tension: 0.3,
      fill: true,
    }],
  }, {
    plugins: { legend: { display: false } },
    scales: {
      y: { suggestedMin:-100, suggestedMax:100, ticks:{font:{size:10},callback:v=>v+'%'}, grid:{color:'rgba(0,0,0,.04)'} },
      x: { ticks:{font:{size:10},autoSkip:false,maxRotation:45}, grid:{display:false} },
    },
  });
}

// =============================================================================
// TEMA POR DIA (dot chart)
// =============================================================================
function renderTemaPorDia(recs) {
  const validos = recs.filter(r => r._date && r.tema_principal_ia && !TEMAS_EXCLUIDOS.includes(r.tema_principal_ia));
  const byDay = groupBy(validos, r => r._date.toISOString().split('T')[0]);
  const days = Object.keys(byDay).filter(Boolean).sort();
  if (!days.length) return '<div class="empty">Sem dados de tema por dia</div>';

  const allTemas = [...new Set(validos.map(r => r.tema_principal_ia))].sort();
  const TEMA_COLORS = ['#686d57','#6d5545','#8a9175','#1D4ED8','#7C3AED','#DC2626','#F59E0B','#0891B2','#DB2777','#059669','#D97706','#4F46E5'];
  const dayLabels = days.map(d => { const dt = new Date(d+'T12:00:00'); return dt.getDate()+'/'+pad(dt.getMonth()+1); });

  let html = `<div class="dot-chart-wrap"><table class="dot-chart">
    <thead><tr><td></td>${dayLabels.map(l=>`<th>${l}</th>`).join('')}</tr></thead><tbody>`;

  allTemas.forEach((tema, ti) => {
    const color = TEMA_COLORS[ti % TEMA_COLORS.length];
    const cells = days.map(d => {
      const dr = (byDay[d]||[]).filter(r => r.tema_principal_ia === tema);
      if (!dr.length) return '<td>·</td>';
      const hasRisco = dr.some(r => isCritico(r));
      return `<td><span class="dot" style="background:${hasRisco ? '#DC2626' : color}" title="${dr.length}x ${tema}">${dr.length}</span></td>`;
    }).join('');
    html += `<tr><td class="dot-row-label" title="${esc(tema)}">${esc(tema.length>18?tema.slice(0,17)+'…':tema)}</td>${cells}</tr>`;
  });

  html += `</tbody></table></div>
    <div style="margin-top:.5rem;font-size:.7rem;color:var(--gray-400)">🔴 = comentário crítico · número = ocorrências no dia</div>`;
  return html;
}

// =============================================================================
// TRENDING TOPICS
// =============================================================================
function renderTrendingTopics(recs) {
  if (!recs.length) return '<div class="empty">Sem dados</div>';
  const validos = recs.filter(r => r.tema_principal_ia && !TEMAS_EXCLUIDOS.includes(r.tema_principal_ia));
  const days = [...new Set(validos.filter(r=>r._date).map(r=>r._date.toISOString().split('T')[0]))].sort();
  const allTemas = [...new Set(validos.map(r => r.tema_principal_ia))];
  const half = Math.ceil(days.length/2);
  const recs1 = validos.filter(r=>r._date && days.indexOf(r._date.toISOString().split('T')[0])<half);
  const recs2 = validos.filter(r=>r._date && days.indexOf(r._date.toISOString().split('T')[0])>=half);

  const rows = allTemas.map(tema => {
    const total = validos.filter(r=>r.tema_principal_ia===tema).length;
    const n1 = recs1.filter(r=>r.tema_principal_ia===tema).length;
    const n2 = recs2.filter(r=>r.tema_principal_ia===tema).length;
    const trend = days.length<2 ? '→' : n2>n1 ? '↑' : n2<n1 ? '↓' : '→';
    const cls = trend==='↑' ? 'tend-up' : trend==='↓' ? 'tend-down' : 'tend-eq';
    return { tema, total, trend, cls };
  }).sort((a,b)=>b.total-a.total);

  if (!rows.length) return '<div class="empty">Sem temas identificados</div>';
  return `<table class="trending-table">
    <thead><tr><th>Tema</th><th style="text-align:center">Total</th><th style="text-align:center">Tendência</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td><span class="tag-theme">${esc(r.tema)}</span></td>
      <td style="text-align:center;font-weight:600">${r.total}</td>
      <td style="text-align:center" class="${r.cls}">${r.trend}</td>
    </tr>`).join('')}</tbody></table>`;
}

// =============================================================================
// COMENTÁRIOS CRÍTICOS (unidade)
// =============================================================================
function renderComentariosCriticos(recs) {
  const criticos = recs
    .filter(r => r.comentario_original && (r.criticidade_ia==='Alta'||r.criticidade_ia==='Crítica'||isCritico(r)||r.requer_acao))
    .sort((a,b) => {
      const p = {'Crítica':0,'Alta':1,'Média':2,'Baixa':3};
      return (p[a.criticidade_ia]||3)-(p[b.criticidade_ia]||3);
    }).slice(0,20);

  if (!criticos.length) return '<div class="empty">Nenhum comentário crítico nesta unidade</div>';

  return `<div class="comment-list">${criticos.map((r,i) => {
    const ncClass = r.tipo_nps==='Promotor' ? 'nc-promotor' : r.tipo_nps==='Detrator' ? 'nc-detrator' : 'nc-neutro';
    const critClass = (r.criticidade_ia||'baixa').toLowerCase().replace(/[íi]/g,'i').replace(/[eé]/g,'e');
    const critTag = `<span class="tag-crit crit-${critClass}">${esc(r.criticidade_ia||'—')}</span>`;
    const criticoTag = isCritico(r) ? `<span class="kpi-badge badge-red">Crítico</span>` : '';
    const acaoTag = r.requer_acao ? `<span class="kpi-badge badge-amber">Ação</span>` : '';
    const temaTag = r.tema_principal_ia && !TEMAS_EXCLUIDOS.includes(r.tema_principal_ia) ? `<span class="tag-theme">${esc(r.tema_principal_ia)}</span>` : '';
    return `<div class="comment-card" id="cc-${i}">
      <div class="comment-header" onclick="toggleComment('cc-${i}')">
        <span class="nota-circle ${ncClass}">${r._nota}</span>
        <div class="comment-meta">${critTag}${criticoTag}${acaoTag}${temaTag}
          <span style="font-size:.72rem;color:var(--gray-400)">${r._date?r._date.toLocaleDateString('pt-BR'):''}</span>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="comment-body">
        <div>${esc(r.comentario_original)}</div>
        ${r.resumo_ia?`<div class="comment-resumo">💡 ${esc(r.resumo_ia)}</div>`:''}
        ${r.acao_sugerida_ia?`<div class="comment-action">➜ ${esc(r.acao_sugerida_ia)}</div>`:''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function toggleComment(id) {
  document.getElementById(id)?.classList.toggle('open');
}

// =============================================================================
// PLANO DE AÇÃO POR UNIDADE
// =============================================================================
function renderPlanoAcaoUnidade(recs) {
  const comAcao = recs.filter(r => r.acao_sugerida_ia && r.requer_acao);
  const pool = comAcao.length ? comAcao : recs.filter(r => r.acao_sugerida_ia);
  if (!pool.length) return '<div class="empty">Nenhuma ação sugerida pela IA</div>';

  const byTema = groupBy(pool, r => r.tema_principal_ia || 'Outro');
  const items = Object.entries(byTema).sort((a,b)=>b[1].length-a[1].length).slice(0,6);

  return items.map(([tema, v]) => {
    const sample = v.find(r=>r.acao_sugerida_ia)||v[0];
    const prio = v.some(r=>r.criticidade_ia==='Alta'||r.criticidade_ia==='Crítica') ? 'Alta'
      : v.some(r=>r.criticidade_ia==='Média') ? 'Média' : 'Baixa';
    const critico = v.some(r=>r.criticidade_ia==='Crítica');
    const recorrente = v.some(r=>r.problema_recorrente);
    const qtd = v.length;
    let tipoProbTag;
    if (critico) tipoProbTag = '<span class="prob-tag prob-critico">Muito Grave</span>';
    else if (recorrente) tipoProbTag = '<span class="prob-tag prob-recorrente">Muito Recorrente</span>';
    else if (qtd >= 3) tipoProbTag = '<span class="prob-tag prob-repetido">Repetido</span>';
    else tipoProbTag = '<span class="prob-tag prob-novo">Novo</span>';

    return `<div style="padding:.65rem 0;border-bottom:1px solid var(--gray-100)">
      <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.25rem;flex-wrap:wrap">
        <span class="tag-theme">${esc(tema)}</span>
        <span class="prio-tag prio-${prio.toLowerCase()}">${prio}</span>
        ${tipoProbTag}
        <span style="font-size:.72rem;color:var(--gray-400);margin-left:auto">${qtd} ocorrência${qtd>1?'s':''}</span>
      </div>
      <div style="font-size:.8rem;color:var(--gray-600)">${esc(sample?.acao_sugerida_ia||'—')}</div>
    </div>`;
  }).join('') || '<div class="empty">Sem ações identificadas</div>';
}

  )].sort();

function filterUnitPainel(tema) {
  _unitPainelTema = tema;
  document.querySelectorAll('#unit-painel-filters .gl-painel-filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tema === tema);
  });
  const uRecs = allRecords.filter(r => r.unidade_padronizada === _unitPainelUnit);
  document.getElementById('unit-painel-comments').innerHTML = renderUnitPainelComments(uRecs, tema);
}

function renderUnitPainelComments(uRecs, tema) {
  let filtered = uRecs.filter(r => r.comentario_original || r.resumo_ia);
  if (tema !== 'todos') filtered = filtered.filter(r => r.tema_principal_ia === tema);

  const ord = {'Crítica':0,'Alta':1,'Média':2,'Baixa':3};
  filtered.sort((a, b) => {
    const cDiff = (ord[a.criticidade_ia]||3) - (ord[b.criticidade_ia]||3);
    if (cDiff !== 0) return cDiff;
    return (b._date||0) - (a._date||0);
  });

  if (!filtered.length) {
    return `<div style="text-align:center;padding:2rem;color:var(--gray-400);font-size:.85rem">Nenhum comentário para este filtro.</div>`;
  }

  return filtered.map(r => {
    const critCls = (r.criticidade_ia||'baixa').toLowerCase()
      .replace(/[íi]/g,'i').replace(/[eé]/g,'e').replace(/ê/g,'e');
    const ncClass  = r.tipo_nps === 'Promotor' ? 'nc-promotor' : r.tipo_nps === 'Detrator' ? 'nc-detrator' : 'nc-neutro';
    const cancelBadge = isCritico(r)
      ? `<span style="background:#FEE2E2;color:#991B1B;font-size:.63rem;font-weight:700;padding:.12rem .4rem;border-radius:3px">Possibilidade de cancelamento</span>` : '';
    return `<div class="gl-painel-comment-card">
      <div class="gl-painel-comment-header">
        <span class="nota-circle ${ncClass}" style="width:24px;height:24px;font-size:.7rem;flex-shrink:0">${r._nota}</span>
        <span class="tag-crit crit-${critCls}" style="font-size:.63rem">${esc(r.criticidade_ia||'—')}</span>
        ${r.tema_principal_ia ? `<span class="tag-theme" style="font-size:.63rem">${esc(r.tema_principal_ia)}</span>` : ''}
        ${cancelBadge}
        <span style="font-size:.68rem;color:var(--gray-400);margin-left:auto">${r._date ? r._date.toLocaleDateString('pt-BR') : ''}</span>
      </div>
      ${r.resumo_ia && r.resumo_ia !== 'Sem comentário'
        ? `<div class="gl-painel-resumo">💡 ${esc(r.resumo_ia)}</div>` : ''}
      ${r.comentario_original
        ? `<div class="gl-painel-comentario">"${esc(r.comentario_original)}"</div>` : ''}
      ${r.acao_sugerida_ia
        ? `<div class="gl-painel-acao-item">→ ${esc(r.acao_sugerida_ia)}</div>` : ''}
    </div>`;
  }).join('');
}

function closePanel() {
  document.getElementById('gl-panel-overlay').classList.remove('open');
  document.getElementById('gl-panel').classList.remove('open');
  document.body.style.overflow = '';
}

function toggleProblema(id) {
  const acc = document.getElementById(id);
  const btn = document.getElementById('btn-' + id);

  const isOpen = acc.classList.toggle('open');
  const total = btn.textContent.match(/\d+/)?.[0] || '';
  const label = btn.textContent.includes('detrator') ? (parseInt(total) > 1 ? 'detratores' : 'detrator') : '';
  btn.textContent = (isOpen ? '▲ ' : '▼ ') + total + ' ' + label;

    <div class="gl-panel-section" style="padding-bottom:0">
      <div class="gl-panel-section-title">Filtrar por unidade</div>
      ${filterBtns}
    </div>
    <div class="gl-panel-section" id="problema-painel-comments" style="padding-top:.75rem">
      ${renderProblemaPainelComments(tRecs, 'todos')}
    </div>`;

  document.getElementById('gl-panel-overlay').classList.add('open');
  document.getElementById('gl-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function filterProblemaPanel(unidade) {
  _problemaPainelUnidade = unidade;
  document.querySelectorAll('#problema-painel-filters .gl-painel-filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.unidade === unidade);
  });
  const tRecs = allRecords.filter(r => r.tema_principal_ia === _problemaPainelTema);
  document.getElementById('problema-painel-comments').innerHTML = renderProblemaPainelComments(tRecs, unidade);
}

function renderProblemaPainelComments(tRecs, unidade) {
  let filtered = tRecs.filter(r => r.comentario_original || r.resumo_ia);
  if (unidade !== 'todos') filtered = filtered.filter(r => r.unidade_padronizada === unidade);

  const ord = {'Crítica':0,'Alta':1,'Média':2,'Baixa':3};
  filtered.sort((a, b) => {
    const cDiff = (ord[a.criticidade_ia]||3) - (ord[b.criticidade_ia]||3);
    if (cDiff !== 0) return cDiff;
    return (b._date||0) - (a._date||0);
  });

  if (!filtered.length) {
    return `<div style="text-align:center;padding:2rem;color:var(--gray-400);font-size:.85rem">Nenhum comentário para este filtro.</div>`;
  }

  return filtered.map(r => {
    const critCls = (r.criticidade_ia||'baixa').toLowerCase()
      .replace(/[íi]/g,'i').replace(/[eé]/g,'e').replace(/ê/g,'e');
    const ncClass  = r.tipo_nps === 'Promotor' ? 'nc-promotor' : r.tipo_nps === 'Detrator' ? 'nc-detrator' : 'nc-neutro';
    const cancelBadge = isCritico(r)
      ? `<span style="background:#FEE2E2;color:#991B1B;font-size:.63rem;font-weight:700;padding:.12rem .4rem;border-radius:3px">Possibilidade de cancelamento</span>` : '';
    return `<div class="gl-painel-comment-card">
      <div class="gl-painel-comment-header">
        <span class="nota-circle ${ncClass}" style="width:24px;height:24px;font-size:.7rem;flex-shrink:0">${r._nota}</span>
        <span class="tag-crit crit-${critCls}" style="font-size:.63rem">${esc(r.criticidade_ia||'—')}</span>
        <span style="font-size:.63rem;font-weight:600;color:var(--gray-700)">${esc(r.unidade_padronizada||'')}</span>
        ${cancelBadge}
        <span style="font-size:.68rem;color:var(--gray-400);margin-left:auto">${r._date ? r._date.toLocaleDateString('pt-BR') : ''}</span>
      </div>
      ${r.resumo_ia && r.resumo_ia !== 'Sem comentário'
        ? `<div class="gl-painel-resumo">💡 ${esc(r.resumo_ia)}</div>` : ''}
      ${r.comentario_original
        ? `<div class="gl-painel-comentario">"${esc(r.comentario_original)}"</div>` : ''}
      ${r.acao_sugerida_ia
        ? `<div class="gl-painel-acao-item">→ ${esc(r.acao_sugerida_ia)}</div>` : ''}
    </div>`;
  }).join('');
}

// =============================================================================
// UTILS
// =============================================================================
function show(id, display) { const el=document.getElementById(id); if(el) el.style.display=display||'block'; }
function hide(id) { const el=document.getElementById(id); if(el) el.style.display='none'; }
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
